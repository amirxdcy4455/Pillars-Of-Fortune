# The name of the world players spawn in when not in a game
lobby-world: world

# Database settings
# provider: json | mysql
database:
  provider: json
  mysql:
    host: 127.0.0.1
    port: 3306
    user: root
    password: ""
    database: pillars

settings:
  # Particle effects shown around NPCs
  # style options: rotating_ring | spiral | double_helix | pulse | rain | crown
  npc_particles:
    enabled: true
    style: rotating_ring
    color: 7
    speed: 5
    density: 6

  # Lobby hotbar items вЂ” change name and slot as needed
  game_menu:
    slot: 0
    name: "В§rВ§4Game Menu В§7[Use]"
  market:
    slot: 8
    name: "В§rВ§dMarket В§7[Use]"
  spectate_map:
    slot: 4
    name: "В§rВ§eSpectate Map В§7[Use]"


itemBlackList:
- "barrier"
- "zombie_spawn_egg"
- "villager_spawn_egg"
- "bedrock"


# Scoreboard settings
# update-interval: how often the scoreboard refreshes (in ticks, 20 = 1 second)
# Available placeholders:
#   {player_name}, {player_coins}, {player_wins}, {player_kills},
#   {player_deaths}, {player_kdr}, {online_players},
#   {game_id}, {game_players}, {game_max_players}, {game_min_players},
#   {game_time_left}, {date}, {time}
scoreboard:
  enabled: true
  update-interval: 20

  lobby:
    enabled: true
    title: "В§6В§lPILLARS"
    date-format: "Y/m/d"
    time-format: "H:i:s"
    datetime-format: "Y/m/d H:i:s"
    lines:
      - "В§8В§mв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ"
