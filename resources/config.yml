      - " В§7Online: В§a{online_players}"
      - " В§7Coins: В§e{player_coins}"
      - " В§7Wins: В§b{player_wins}"
      - " В§7Kills: В§c{player_kills}"
      - " В§7KDR: В§d{player_kdr}"
