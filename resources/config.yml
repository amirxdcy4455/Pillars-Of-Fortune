    lines:
      - "В§8В§mв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ"
      - " В§fMap: В§a{game_id}"
      - " В§fPlayers: В§e{game_players}"
